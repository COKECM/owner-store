name: DeepSeek V4P Code Review

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run DeepSeek Review via Python
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python -c "
          import os, json, urllib.request, subprocess, urllib.error

          # 1. 获取 Git Diff（🌟 核心改动：排除 .github 文件夹，不让 AI 检查工作流本身）
          try:
              diff_data = subprocess.check_output(['git', 'diff', 'origin/master...HEAD', '--', '.', ':(exclude).github']).decode('utf-8', errors='ignore')
          except Exception as e:
              print('获取 Diff 失败:', e)
              exit(0)

          if not diff_data.strip():
              print('除了配置文件，业务代码没有检测到改动。')
              exit(0)

          # 2. 组装请求
          api_key = os.getenv('DEEPSEEK_API_KEY')
          url = 'https://api.deepseek.com/anthropic/v1/messages'
          
          headers = {
              'x-api-key': api_key,
              'anthropic-version': '2023-06-01',
              'content-type': 'application/json'
          }
          
          prompt = f'你是一个拥有15年经验的前端架构师。请用中文针对以下代码改动(Git Diff)提出 Code Review 意见。如果发现逻辑漏洞、Shopify 规范冲突或性能隐患，请直接指出并给出修改后的代码示例：\n\n{diff_data}'
          
          payload = {
              'model': 'deepseek-v4-pro',
              'max_tokens': 4096,
              'messages': [{'role': 'user', 'content': prompt}]
          }

          req = urllib.request.Request(url, data=json.dumps(payload).encode('utf-8'), headers=headers, method='POST')
          
          try:
              with urllib.request.urlopen(req) as response:
                  res_body = response.read().decode('utf-8')
                  res_data = json.loads(res_body)
              
              # 🌟 核心改动：精准抓取美观的 text，扔掉无用的格式杂质
              ai_comment = ''
              if 'content' in res_data:
                  for item in res_data['content']:
                      if isinstance(item, dict) and item.get('type') == 'text':
                          ai_comment += item.get('text', '')
              
              if not ai_comment:
                  ai_comment = '⚠️ 无法解析 AI 审查文本，原始返回内容：\n' + res_body
                  
          except Exception as e:
              print('请求或解析失败:', e)
              exit(1)

          # 3. 把 AI 的回复发表到 GitHub PR 评论区（自动触发漂亮的 Markdown 网页渲染）
          github_token = os.getenv('GITHUB_TOKEN')
          repo = os.getenv('REPO')
          pr_num = os.getenv('PR_NUMBER')
          
          comment_url = f'https://api.github.com/repos/{repo}/issues/{pr_num}/comments'
          comment_headers = {
              'Authorization': f'token {github_token}',
              'Accept': 'application/vnd.github.v3+json',
              'content-type': 'application/json'
          }
          comment_payload = {'body': f'### 🤖 DeepSeek-V4P 架构师审查报告：\n\n{ai_comment}'}
          
          comment_req = urllib.request.Request(comment_url, data=json.dumps(comment_payload).encode('utf-8'), headers=comment_headers, method='POST')
          urllib.request.urlopen(comment_req)
          print('DeepSeek 审查意见已成功发送至 PR 评论区！')
          "