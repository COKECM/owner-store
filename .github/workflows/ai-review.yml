name: DeepSeek V4P Code Review

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff & Call DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 抓取改动代码
          git diff origin/master...HEAD > pr_diff.txt
          
          if [ ! -s pr_diff.txt ]; then
            echo "No code changes found."
            exit 0
          fi

          # 2. 呼叫接口
          RESPONSE=$(curl -s -X POST "https://api.deepseek.com/anthropic/v1/messages" \
            -H "x-api-key: $DEEPSEEK_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{
              "model": "deepseek-v4-pro",
              "max_tokens": 2048,
              "messages": [
                {
                  "role": "user",
                  "content": "你是一个拥有15年经验的前端架构师。请用中文针对以下代码改动提出 Code Review 意见：\n\n'"$(cat pr_diff.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')_PRICE_PLACEHOLDER_"'"
                }
              ]
            }')

          # 🚨 【核心 Debug 行】直接把原始返回打印到控制台，供我们肉眼查看
          echo "================ 接口返回原始数据 ================"
          echo "$RESPONSE"
          echo "=================================================="

          # 3. 解析并发表评论
          AI_COMMENT=$(echo "$RESPONSE" | jq -r '.content[0].text')
          
          if [ "$AI_COMMENT" = "null" ] || [ -z "$AI_COMMENT" ]; then
            echo "Error: DeepSeek returned an empty response or error."
            exit 1
          fi

          curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"body\": \"### 🤖 DeepSeek-V4P 架构师审查报告：\n\n$AI_COMMENT\"}"