name: DeepSeek V4P Code Review

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run DeepSeek V4P (Anthropic Mode) Review
        uses: mtfoley/pr-agent-action@v1
        env:
          MODEL_PROVIDER: "anthropic"
          ANTHROPIC_MODEL: "deepseek-v4-pro"
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          custom_prompt: "请使用中文，针对这段拉取请求(PR)的代码改动提出深度 Code Review 意见。如果发现逻辑漏洞、Shopify 规范冲突或性能隐患，请直接指出并给出修改后的代码示例。"