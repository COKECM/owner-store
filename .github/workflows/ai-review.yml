name: DeepSeek V4P Code Review

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run DeepSeek V4P (Anthropic Mode) Review
        # ✅ 这里修正为官方正版的开源插件路径
        uses: coderabbitai/pr-agent-action@main
        env:
          MODEL_PROVIDER: "anthropic"
          ANTHROPIC_MODEL: "deepseek-v4-pro"
          # 🔒 动态读取你在 Settings 里存的密钥
          ANTHROPIC_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_BASE_URL: "https://api.deepseek.com/anthropic"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 让 AI 强制用中文输出
          PR_REVIWER.EXTRA_INSTRUCTIONS: "请完全使用中文进行代码审查。指出代码中的 Bug、Shopify 规范冲突或性能隐患，并给出修改后的代码示例。"